<!doctype html>
<!--

  short-comments (短評) block that Scraper.ScrapeReviewSummary parses (Story 12-6).
  Comment text is intentionally Simplified Chinese so the test asserts the s2twp
  Traditional conversion (AC #3). Six items present to exercise the 5-item cap.
-->
<html>

                <span class="comment-info">
                  <a href="/people/a/" class="">影评人甲</a>

                </span>

              <p class="comment-content"><span class="short">这部电影太棒了</span></p>
            </div>
          </div>
