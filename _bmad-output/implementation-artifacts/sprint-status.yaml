chore/visual-bootstrap-19-9-recent-stale-linux`, requires-manual-review label) is the manual recovery precedent this story makes the LAST of its kind. Three failure modes the v1 first-run-only path doesn't handle (incremental addition — 19-9's recent/stale case; per-fixture rebless; platform-suffix migration like adding `-linux-arm64.png`), all closed by per-fixture missing-detection. **Five deliverables**: (1) **`tests/visual/bootstrap-detection.mjs`** — Node ESM parser classifying Playwright failure logs into `missing-baseline` / `pixel-diff` / `other` buckets; outputs `bootstrap_needed = missing > 0 && pixel-diff == 0 && other == 0`; conservative classification (unknown patterns → `other` → human review). (2) **`tests/visual/bootstrap-detection.spec.ts`** — ≥ 8 vitest cases pinning the parser's pattern-matching contract (synthetic logs covering all four classification buckets + edge cases like `-darwin` vs `-linux` discrimination, snapshot path outside scope, mixed missing+diff, clean output). (3) **`package.json` script** — `test:visual:update-missing` running `playwright test --project=visual --update-snapshots=missing` (Playwright 1.43+ GA `=missing` flag; repo pins 1.58.0 → no fallback needed). (4) **`.github/workflows/visual-regression.yml`** — step 8 replaced with `Check Linux baseline freshness` that runs verify-only as a probe + pipes stdout through the parser + outputs `bootstrap_needed`/`missing_paths`/`missing_count` to `$GITHUB_OUTPUT`; steps 9/10/11 get parallel incremental siblings with separate `if:` conditionals (first-run path preserved verbatim — both branches mutually exclusive); incremental PR opens with separate body template listing missing fixtures + `requires-manual-review` label preserved (Sally gate canonical for BOTH paths per Murat's 19-4b Task 5 ruling). (5) **Documentation sync** — workflow header comment block (L42-50) updates the "永久變成死碼" claim with `(僅指 first-run bootstrap; incremental bootstrap 由 bugfix-19-9 補上)` parenthetical; story 19-5 Change Log gets `[@contract-v1→v2] AC #4` bump row (two-stage verify per Rule 20: `{what changed: zero-count → per-fixture missing-detection, what breaks downstream: incremental stories silently fall back to manual recovery without v2}`); story 19-9 Dev Notes L116 gets inline addendum cross-referencing this bugfix (Status `done` preserved, no Change Log row needed); `tests/visual/README.md` §Platform-suffix gets incremental-path bullet. **Key SM decisions in Dev Notes**: (a) **Log-parsing over snapshot-path enumeration** — Playwright has no `--list-snapshots` (snapshot paths computed inside test bodies at runtime); parsing the verify-only probe's stdout is strictly cheaper (no extra test cycle); brittleness to Playwright major bumps mitigated by AC #4 unit tests pinning pattern strings; (b) **Conservative classification** — unknown failure patterns → `other` → `bootstrap_needed = false` → human review; false-negative cost low (manual PR like #11), false-positive cost HIGH (auto-bless a real regression → defeats Rule 22 gate); (c) **First-run path preserved verbatim** — sibling addition, not refactor; both branches mutually exclusive (`linux_baselines == '0'` vs `bootstrap_needed == 'true' && linux_baselines != '0'`); (d) **No new dependencies** — parser uses Node stdlib (`fs`, `readline`); spec uses vitest (existing devDep); workflow adds `tee` + `node` (both ubuntu-24.04 stdlib); (e) **Sally gate canonical for BOTH paths** — Murat 19-4b Task 5 ruling preserved; new incremental PR opens with same `requires-manual-review` label; (f) **PR #11 NOT reverted** — historical record of the gap stays in main; 19-9 Status remains `done`; (g) **Operational verification via dry-run** — AC #6 mandates throwaway feature branch + `workflow_dispatch` to validate incremental PR opens correctly BEFORE relying on it for the next real incremental story; the synthetic missing-fixture diff is throwaway, the auto-opened incremental PR is closed without merging; (h) **Throughput** — verify-only probe ~1.2m; if `bootstrap_needed`, second `test:visual:update-missing` run ~equal duration; total CI time ~2.5m for incremental bootstrap (acceptable). **Rule 20 bump accounting**: Story 19-5 AC #4 v2→v3 (initial SM draft mis-claimed v1→v2 — corrected during Amelia dev-story Step 2 stamp check 2026-05-28; 19-5 AC #4 had already been bumped to v2 on 2026-05-19 per 19-5 CR H1 for the audit-doc line format, an orthogonal surface from this story's trigger-semantics shape change so v2's format guarantee survives into v3). Both the bump row in 19-5's Change Log and the AC #4 stamp body in the 19-5 story file get updated at impl time per the bump protocol. No own [@contract-vN] stamps on this story — the new internal surfaces (npm script, parser module) are not yet referenced by downstream stories; forward-only retrofit applies when a real consumer materializes. Grep helpers per Rule 20: at impl close, `grep -rnE 'confirmed against \[@contract-v1\] \(Story 19-5'` verifies whether any downstream ack lines need re-stamping to v2 (as of 2026-05-28: only story 19-9 references 19-5 generally, not AC #4 specifically — so no ack-update is anticipated, but verify). 🔒 Rule 7: N/A (pure CI / Node / docs; 0 Go). 🎨 UX Verification: SKIPPED — no UI rendering change; the only React-adjacent file is the (throwaway) synthetic fixture entry for AC #6 dry-run, which is deleted post-validation. **Dependencies**: depends on 19-5 (done) + 19-9 (done) + 19-4b (done); PR #11 is OPEN at story-create (label `requires-manual-review`, Sally gate). Story does NOT block on PR #11's merge — but AC #8's `pnpm run test:visual` GREEN gate assumes the 6 `recent`/`stale` `-linux.png` baselines from PR #11 are committed to main; if PR #11 is closed without merging, this story's regression contingency = re-run manual artifact extraction OR convert the AC #6 synthetic fixture into a real one. **Charter line (CR-surfaced 2026-05-28 during 19-9 main-merge monitoring)**: `→ Bob /create-story (YOLO) → Amelia /dev-story: per-fixture missing-detection in Visual Regression / Main bootstrap path + targeted --update-snapshots=missing + sibling incremental branch + Sally gate preserved. Closes the gap surfaced by 19-9 PR #10 main-merge.`
