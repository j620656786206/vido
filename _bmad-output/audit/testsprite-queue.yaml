# _bmad-output/audit/testsprite-queue.yaml
#
# Single source of truth for the monthly TestSprite cron workflow
# (`.github/workflows/testsprite-monthly.yml`, story 19-6). Schema_version
# is the Rule 20 [@contract-v1] contract surface — bump on any shape change;
# downstream 19-7 quota-warning workflow reads this file and depends on
# `schema_version == 1` + the `last_run:` block shape + the `history:`
# per-entry shape. Pruning rule: `history` capped at 200 entries, FIFO.
#
# Discovery note (2026-05-19): story AC #2 / Task 1 said "62 entries total
# seeded from `ls testsprite_tests/TC*.py` at story-create time" but the
# verification step (`ls testsprite_tests/TC*.py | wc -l`) yields 30 at
# implementation time. The discrepancy is from deprecated cases pending v4
# regen (MEMORY → project_testsprite_v4_regen.md). Task 1 explicitly
# mandated runtime verification, so this seed contains the actual 30 (IDs:
# TC001–023, TC027–029, TC033–034, TC037–038).
schema_version: 1
quota:
  monthly_budget: 150 # TestSprite Free-plan ceiling; bump if user upgrades.
  consumption_cap_pct: 80 # workflow's self-imposed per-run ceiling — never crosses.
  reserved_credits: 30 # reserved_credits MUST equal monthly_budget * (100 - consumption_cap_pct) / 100 — keep in sync manually if any of the three change.
last_run:
  started_at: null # ISO 8601 UTC; null = never run
  finished_at: null
  credits_at_start: null # integer remaining from testsprite_check_account_info before the loop
  credits_at_end: null
  credits_consumed: null # = credits_at_start - credits_at_end
  test_ids_run: [] # ordered list of TestSprite TC IDs run this execution
  status: null # "success" | "budget-exhausted" | "api-failure" | "test-failures-only"
  run_url: null # GitHub Actions run URL — back-link for triage
queue:
  # Ordered list — entry [0] runs next. After a successful execution the
  # consumed entries are moved to `history` (below) and the next run picks
  # up from the remaining queue. When the queue is empty, the workflow
  # refills from `history` (oldest-first, simple FIFO rotation — this is
  # the "continuous coverage" mode mentioned in the user story).
  - id: TC001
    file: testsprite_tests/TC001_Dashboard_loads_core_panels_and_status.py
    credits_estimated: 5
    last_run_at: null
    last_status: null
