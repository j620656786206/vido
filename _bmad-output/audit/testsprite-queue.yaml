# _bmad-output/audit/testsprite-queue.yaml
#
# Single source of truth for the monthly TestSprite cron workflow
# (`.github/workflows/testsprite-monthly.yml`, story 19-6). Schema_version
# is the Rule 20 [@contract-v2] contract surface — bump on any shape change;
# downstream 19-7 quota-warning workflow reads this file and depends on
# `schema_version == 2` + the `last_run:` block shape + the `history:`
# per-entry shape. Pruning rule: `history` capped at 200 entries, FIFO.
#
# 2026-05-19 CR closeout — schema_version 1 → 2 ([@contract-v1→v2] AC #2):
# the v1 schema declared `last_run.credits_at_start` / `credits_at_end` /
# `credits_consumed` as part of the contract surface. Phase 2's CLI-shape
# discovery (see [@contract-v1→v2] AC #3) revealed that the bare CLI does
# not expose `testsprite_check_account_info` as a subcommand — only the
# MCP server mode does — so these three fields cannot be populated without
# a separate MCP-stdio dance the workflow does not implement. v2 keeps the
# field NAMES (so 19-7 readers don't break on a missing key) but documents
# them as "always null in v2 — implementer chose to defer live account-info
# query to a follow-up story" (call it 19-7a if/when wanted). Also: per-case
# `last_status` enum is now strictly `pass | fail | error | null` (the v1
# workflow code path leaked `blocked` and `unknown` into the file — v2's
# CR-time fix maps BLOCKED → error and missing-report → null).
#
# 2026-05-19 reseed (v3 → v4 catalog): the initial seed (committed
# 2026-05-19 in PR #6) listed 30 TC IDs derived from `ls
# testsprite_tests/TC*.py | wc -l` at impl-time. Investigation during the
# follow-up local CLI run revealed that 22 of those 30 IDs were v3-catalog
# orphans (TC001–008, TC015–023, TC027–029, TC033–034) that
# `testsprite_frontend_test_plan.json` (v4, dated 2026-03-24) no longer
# lists — running them in the monthly cron would test deprecated features
# and produce false positives/negatives. The plan defines 50 v4 IDs total:
# TC009–014, TC035–038, TC039–078 (gaps at TC024–026 / TC030–032 are
# permanent — v4 reused some IDs and dropped others). This reseed replaces
# the 30 v3-orphan entries with the canonical 50 v4 plan IDs.
#
# 2026-05-19 local generation: TC035's Python file was generated locally
# via `npx @testsprite/testsprite-mcp@0.0.37 generateCodeAndExecute` and
# committed; it passed when executed. TC036 retry was BLOCKED (needs real
# qBittorrent reachable from Vido API; deferred). The remaining 48 IDs
# have plan entries but no Python files yet — the monthly cron's first
# pass over each will generate+execute them.
#
# Per-case cadence: 50 IDs × 5 credits-estimated/case = 250 credits across
# all cases; 80%-cap-per-run = 120 credits = ~24 cases/run → full sweep
# completes in ~3 runs (≈ 3 months); rotation via `history` keeps each
# case exercised every 3 months on average.
schema_version: 2
quota:
  monthly_budget: 150 # TestSprite Free-plan ceiling; bump if user upgrades.
  consumption_cap_pct: 80 # workflow's self-imposed per-run ceiling — never crosses.
  reserved_credits: 30 # reserved_credits MUST equal monthly_budget * (100 - consumption_cap_pct) / 100 — keep in sync manually if any of the three change.
last_run:
  started_at: null # ISO 8601 UTC; null = never run
  finished_at: null
  credits_at_start: null # v2: always null — LIVE account-info unimplementable via bare CLI; field reserved for future MCP-stdio follow-up.
  credits_at_end: null # v2: always null — see credits_at_start.
  credits_consumed: null # v2: always null — = credits_at_start - credits_at_end once live query lands.
  test_ids_run: [] # ordered list of TestSprite TC IDs run this execution
  status: null # "success" | "budget-exhausted" | "api-failure" | "test-failures-only"
  run_url: null # GitHub Actions run URL — back-link for triage
queue:
  # Ordered list — entry [0] runs next. After a successful execution the
  # consumed entries are moved to `history` (below) and the next run picks
  # up from the remaining queue. When the queue is empty, the workflow
  # refills from `history` (oldest-first, simple FIFO rotation — this is
  # the "continuous coverage" mode mentioned in the story user-story).
  # `file:` paths follow TestSprite's naming convention
  # `TCxxx_{plan_title_with_spaces_to_underscores_special_chars_stripped}.py`;
  # for IDs whose Python file does not yet exist locally, TestSprite's
  # generateCodeAndExecute will create it on first cron pass (cost: gen +
  # exec ≈ 5 credits per case).
