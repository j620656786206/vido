# ============================================================================
# Visual Regression — PR-blocking 視覺差異把關
# ============================================================================
#
# Story 19-5 (epic-19 Design-Implementation Drift Audit) 將 19-4 + 19-4b 完成
# 的視覺基準工具 (visual harness) 接上 PR 阻擋型 CI。源頭:bugfix-10-4 根因 ——
# HoverPreviewCard.tsx 與 .pen Component/PosterCardHover (node MQbvp) 失同步
# 多月未被察覺。project-context.md Rule 22 (Epic Retro Design-Drift Audit)
# 指名本工作流為 Rule 22 的執行落點。
#
# 本工作流做什麼:
#   - PR job 對著 tests/visual/components.visual.spec.ts-snapshots/ 下已提交
#     的基準圖跑 `pnpm run test:visual`。失敗 → PR 顯示 ❌(配合擁有者另行
#     在 branch protection 設為必須通過,即阻擋 merge)。差異產物
#     (actual.png / diff.png / traces) 以 14 天保存上傳供審查。
#   - Main job 跑同一個 verify-only 比對,並在「首次執行」時跑一次性的
#     Linux baseline 引導分支(見下方「First-run bootstrap」)。
#
# Runner 版本固定 (AC #5):
#   `runs-on: ubuntu-24.04` 是版本化標籤,而非 `ubuntu-latest`。Linux 的字體
#   渲染 (fontconfig / freetype / DejaVu / Noto / Liberation glyphs) 是決定
#   基準像素的關鍵變數;`-latest` 會自動換版而不經過 PR。當 GitHub 公告淘汰
#   本標籤時(通常移除前 6~12 個月會先公告),升版要自成一個 PR:用
#   `pnpm run test:visual:update` 重產基準、貼上 `requires-manual-review`
#   標籤、單獨一個 commit,並在 _bmad-output/audit/visual-baseline-19-4.md
#   追加 `Linux baselines re-blessed {YYYY-MM-DD} via {new-image-label}
#   (ImageVersion: {value}, previous: {old-image-label})` 一行。
#
# 為什麼是 GitHub-Hosted Runner 標籤而非 Docker image digest (CR 2026-05-19 H1):
#   tests/visual/README.md L98-103 與本 audit doc 的早期版本曾要求「pin the
#   digest, not just the tag」並例示 `mcr.microsoft.com/playwright:vX.Y.Z-jammy`。
#   實作走訪後選用 GitHub-Hosted Runner (`runs-on: ubuntu-24.04`) 而非
#   `container:` + Playwright Docker image:GitHub 不暴露 runner image 的
#   SHA digest(只有版本化標籤);而 `ImageVersion` 環境變數會在每次跑時印出
#   `actions/runner-images` 發佈版本號 (例如 `20260512.1.0`),提供「現場式
#   可追溯性」—— 雖非 cryptographic digest,但配合 `actions/runner-images`
#   release notes 可逆推到 commit。本 audit-doc 追加格式因此把 `ImageVersion`
#   納入,讓未來 mass-rebless 投查仍有指紋。Docker-digest 路徑作為被拒方案
#   記錄於 audit doc 的 "Image pinning policy" 段。
#
# 引導決策樹 (AC #4 — bumped to [@contract-v3] by story bugfix-19-9 2026-05-28):
#   標準決策樹見 tests/visual/README.md §Platform-suffix L82–L96,本工作流
#   即依此實作。**兩條 bootstrap 分支並存且互斥**:
#
#   (1) **First-run path** (linux_baselines == '0'): 在 main push 上,若
#       tests/visual/components.visual.spec.ts-snapshots/ 下沒有任何 `-linux.png`
#       基準,則 main job 會跑 `pnpm run test:visual:update`、在
#       _bmad-output/audit/visual-baseline-19-4.md 追加一行來源紀錄,並開出
#       一個 `chore(visual): bootstrap Linux baselines` PR、貼上
#       `requires-manual-review` 標籤(依 19-4b Task 5 規定的 Sally / UX 把關)。
#       本路徑在 19-5 落地後的第一次 main push 觸發過一次,從此「對於這個
#       條件」變成死碼 —— 但**不是整條 bootstrap 邏輯死碼**(見路徑 2)。
#
#   (2) **Incremental path** (linux_baselines != '0' && bootstrap_needed == 'true',
#       story bugfix-19-9): verify-only probe 偵測到一或多個 `-linux.png` 缺失
#       (典型場景: 上游 PR 引入新 fixture/state,只 commit `-darwin` 沒
#       commit `-linux`),且 parser 把所有失敗歸類為純 missing-baseline
#       (無 pixel-diff / 無 other),則跑 `pnpm run test:visual:update-missing`
#       (Playwright `--update-snapshots=missing`,只補缺失不覆寫現存),audit
#       doc 追加 incremental 專屬格式行 (含 missing_count + 路徑清單),並開出
#       `chore(visual): bootstrap N missing -linux baselines (incremental)` PR、
#       同樣貼 `requires-manual-review` 標籤 (Sally gate 兩條 path 共用)。本路徑
#       自 bugfix-19-9 後常駐,每次 incremental fixture addition 自動觸發。
#
#   (3) **Steady-state** (linux_baselines != '0' && bootstrap_needed != 'true'):
#       verify-probe 對齊現存 -linux 基準,無 missing 無 diff → 兩條 bootstrap
#       分支都跳過,job 通過。**或** probe 偵測到 pixel-diff (真實 regression),
#       parser bootstrap_needed=false,final gate `Fail job on real regression`
#       step 收尾失敗 (僅在 pixel-diff 觸發,missing-only 場景永遠走路徑 2)。
#
#   兩條 bootstrap path 共用同一 Sally gate (`requires-manual-review` 標籤)
#   但用不同 PR branch 命名 (first-run: `chore/bootstrap-linux-baselines-${run_id}`;
#   incremental: `chore/bootstrap-linux-baselines-incremental-${run_id}`) 與不同
#   PR body 模板 (first-run 模板說明 darwin→darwin+linux 平台擴張; incremental
#   模板列出缺失基線清單 + 觸發 commit message)。 audit doc 也用不同前綴行
#   (`Linux baselines bootstrapped …` vs `Linux baselines incrementally
#   bootstrapped …`) 讓後續 grep 可區分。
#
# 為什麼用 `pnpm run test:visual` (AC #3),而不用 `nx affected -t e2e:visual`:
#   原因記在 story 19-5 Dev Notes「Nx target vs npm script decision」:
#   (1) 今天 apps/web 上根本沒有 `e2e:visual` target,做法等同 test.yml:284
#   也是直接呼叫 `npx playwright test --shard=...`;(2) `nx affected` 只有
#   當「圖上有理由可以跳過」時才有價值 —— 而下面的 `paths:` filter 已經在
#   觸發層就做掉了(在 runner 開機前就跳過,可省約 30 秒,反觀 runner 跑起來
#   後再判斷只省約 5 秒);(3) `nx affected` 需要在 `pull_request` 事件上
#   接好 base/head SHA、且需要更深的 checkout。對 19-5 的預算而言,直接呼叫
#   npm script 比較乾淨。若未來有 story 找到對 visual 真有 Nx cache 效益的
#   場景,再回頭評估即可。
#
# 首次執行的順序邊界情況 (story Dev Notes):
#   本 story 自身的 PR (PR-19-5) 才是工作流檔案首次出現的時機。它的
#   `Visual Regression / PR` 檢查跑在 ubuntu-24.04 → Playwright 產出 -linux
#   PNG;此時尚無 `-linux.png` 基準可比 → 測試會失敗(這是 Playwright 的
#   正確語意:基準缺漏即視為失敗,不會放水)。本工作流設計上會在 PR-19-5
#   合併後的「第一次」main push 自動引導。合併流程:覆寫該尚未為 required
#   的檢查、合併、main job 觸發、bootstrap 分支觸發、bootstrap PR 合併,之
#   後每次 PR 都會乾淨通過。把本檢查設為 `required`(經 branch protection)
#   是擁有者合併後在 web UI 上一次點擊的事 (AC #2)。
#
# 依賴:
#   tests/visual/components.visual.spec.ts (19-4) + 已提交的 262 張 `-darwin`
#   基準 (19-4 + 19-4b) + 開發限定的 /test/gallery route + playwright.config.ts
#   裡的 `visual` Playwright project。本工作流原樣消費以上契約
#   ([@contract-v1] 於 19-4 AC #1/#2/#5)。
#
# 第三方 action 釘版策略 (CR 2026-05-19 L2):
#   - actions/checkout + actions/setup-node + actions/upload-artifact:
#       major-version tag (官方 GitHub-owned actions;沿用 test.yml baseline)。
#   - pnpm/action-setup@v4: 官方 pnpm action,major-version tag。
#   - dorny/paths-filter@v3: 只讀 git diff,無 write 權限。可接受 major-version tag。
#   - peter-evans/create-pull-request@v6: 握有 `contents: write` +
#       `pull-requests: write`(本工作流唯一具寫入權限的 action)。安全強化
#       建議改 commit-SHA pin;此處沿用 v6 是因為 (a) 觸發邊界限定在自家
#       repo main push 而非外來 fork PR,(b) 該 action 由 GitHub Marketplace
#       認證維護者長期維護。若日後受信任邊界擴大,follow-up story 升級為 SHA-pin。
#
# 參考:
#   - Story file: _bmad-output/implementation-artifacts/19-5-github-actions-visual-regression-pr.md
#   - Audit doc:  _bmad-output/audit/visual-baseline-19-4.md
#   - 決策樹:     tests/visual/README.md §Platform-suffix L82–L96
#   - Rule 22:    project-context.md §「Rule 22 — Epic Retro Design-Drift Audit」
# ============================================================================

name: Visual Regression

on:
  # AC #1 觀察契約演進 (2026-05-18):原本 `on.pull_request.paths:` 直接在
  # trigger 層篩選 —— 但這跟「Branch ruleset 把 `Visual Regression / PR` 設為
  # required check」相衝(PR 改的檔案不在 paths 內 → workflow 完全不觸發
  # → check 永遠 "Expected — Waiting" → ruleset 永久 BLOCK)。
  #
  # 解法:workflow 在所有 PR 上「都觸發」,改用 job 內第一步的
  # `dorny/paths-filter@v3` 判斷是否屬於視覺渲染面變更:
  #   - 屬於 → 跑完整 visual diff 並回報結果
  #   - 不屬於 → job 早退並回報 success(check 顯示 ✅ 帶 "skipped" 字樣)
  # check 名稱不變(`Visual Regression / PR`);ruleset 必須通過的承諾不變;
  # 唯一變化是「對不相關 PR 自動 pass」—— 對下游(ruleset、Rule 22 retros)
  # 屬於放寬而非收緊,不需 Rule 20 contract bump。
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
    # AC #6 — main 一律跑全套,目的是抓住像 dependency 升版、Tailwind
    # 傳遞性變更、或 runner image 的 fontconfig+freetype 安全更新等不在
    # 元件路徑下的漂移。
  workflow_dispatch:

env:
  CI: true

jobs:
  pr:
    name: PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04 # AC #5 — do NOT change to ubuntu-latest, see story 19-5 AC #5
    timeout-minutes: 25
    permissions:
      contents: read
    # AC #7 — PR concurrency:同 PR 強制推送會自動取消前一輪。
    concurrency:
      group: visual-regression-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # AC #1 路徑判斷(內部執行,取代原 `on.pull_request.paths:` filter)。
      # 設計渲染面 — 與檔案系統實況同步 (CR 2026-05-19 H2 修正:原 AC #1
      # 列出的 `apps/web/src/styles/**` 目錄不存在、`apps/web/src/index.css`
      # 檔案不存在;真正的全域 CSS 是 `apps/web/src/styles.css`(由
      # `apps/web/index.html` L10 載入)。同時補上 `apps/web/index.html`
      # 本身(根 HTML 變動會影響 `<meta>`、root container 等渲染表面)。
      # AC #1 因此 [@contract-v1→v2] 矯正路徑清單;觸發模型不變。
      #
      # retro-19-P3 (CI gate-integrity audit, 2026-06-02) — 補上 3 個漏網的
      # 真實渲染面 (audit class (b) "missing real surfaces"):
      #   - `pnpm-lock.yaml`: filter 原本只看 `package.json`,但 transitive
      #     bump(`pnpm update` 或 caret-range 解析到新 minor)只動 lockfile、
      #     不動 package.json → 視覺 PR 閘靜默跳過。這正是
      #     bugfix-19-4b-1-followup CR M1 指認、明文 carry-forward 到本 P3 的
      #     已知缺口(bisect-regression.yml 早已含本路徑)。
      #   - `apps/web/postcss.config.js`: Tailwind→CSS 的 transform pipeline
      #     (`@tailwindcss/postcss` + `autoprefixer`)。比 `tailwind.config.js`
      #     更直接決定 render 後像素 —— 移掉 autoprefixer 即改變輸出。原 filter
      #     看 tailwind.config.js 卻漏了驅動它的 postcss.config.js。
      #   - `apps/web/vite.config.mts`: visual diff 跑在 `nx serve web`(Vite
      #     dev server)上,本檔設定該 server 的 plugins / CSS 處理 / asset 行為,
      #     是 gallery 渲染的決定面之一。
      # 三者皆為「純加寬」(閘觸發更多 PR、絕不更少)→ 對下游(ruleset /
      # Rule 22 retros)只強化 PR-time enforcement,沿用 always-trigger refactor
      # 先例「放寬而非收緊,不需 Rule 20 contract bump」([@contract-v2] 保留;
      # 19-5 AC #1 downstream-ack grep 回 0 consumers,即使走嚴格路徑也只記
      # `no downstream consumers`)。audit class (a)「死路徑」掃描:0 命中 ——
      # 本 filter + bisect-regression.yml filter 全部列出路徑經 P3 逐一驗證皆存在。
      - name: Detect visual-rendering changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            visual:
              - 'apps/web/src/components/**'
              - 'apps/web/src/routes/**'
              - 'apps/web/src/styles.css'
              - 'apps/web/src/app/**'
              - 'apps/web/tailwind.config.js'
              - 'apps/web/postcss.config.js'
              - 'apps/web/vite.config.mts'
              - 'apps/web/src/main.tsx'
              - 'apps/web/index.html'
              - 'tests/visual/**'
              - 'playwright.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/visual-regression.yml'

      # 不相關 PR 的快速通道:check 直接 ✅,後續步驟全跳過。
      # `exit 0` 確保 job 回報 success(GitHub ruleset 對「skipped」的解讀
      # 不一致,但「success」一律算通過)。
      - name: Skip notice (no visual paths changed)
        if: steps.filter.outputs.visual == 'false'
        run: |
          echo "::notice::No visual-rendering surfaces changed in this PR — skipping visual diff."
          echo "Paths watched:"
          echo "  apps/web/src/{components,routes,app}/**"
          echo "  apps/web/src/{styles.css,main.tsx}"
          echo "  apps/web/{tailwind.config.js,postcss.config.js,vite.config.mts,index.html}"
          echo "  tests/visual/**"
          echo "  playwright.config.ts"
          echo "  package.json"
          echo "  pnpm-lock.yaml"
          echo "  .github/workflows/visual-regression.yml"

      - name: Install pnpm
        if: steps.filter.outputs.visual == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        if: steps.filter.outputs.visual == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Node dependencies
        if: steps.filter.outputs.visual == 'true'
        run: pnpm install --frozen-lockfile

      # 只裝 Chromium —— 不裝 webkit/firefox(每次省約 1 GB / 約 30 秒;
      # `visual` Playwright project 本設計上就是 Chromium-only,見
      # playwright.config.ts L148–L162)。
      - name: Install Playwright Chromium
        if: steps.filter.outputs.visual == 'true'
        run: npx playwright install --with-deps chromium

      # 啟用 Vite dev server (`nx serve web`),不是 `nx build` + `npx serve`。
      # 原因:`/test/gallery` 在 production build 中被故意排除 ——
      # `apps/web/src/routes/test/gallery.tsx` 用 `!import.meta.env.PROD && (...)`
      # short-circuit 保證 NAS deployment 看不到 dev-only gallery(story 19-4
      # CR closeout M1 的安全考量)。`nx build --configuration=production`
      # 會讓 `import.meta.env.PROD === true` → gallery 永遠空白 → visual spec
      # `waitForSelector('[data-testid="component-gallery-manifest"]')` 超時。
      # 用 `nx serve web`(Vite dev,`PROD=false`)跟本地 `playwright.config.ts`
      # webServer 的設定一致。背景啟動,迴圈等就緒。
      - name: Start frontend (Vite dev server)
        if: steps.filter.outputs.visual == 'true'
        run: |
          npx nx serve web > /tmp/nx-serve.log 2>&1 &
          ready=0
          for _ in {1..120}; do
            if curl -s http://localhost:4200 > /dev/null 2>&1; then
              echo "Frontend ready"
              ready=1
              break
            fi
            sleep 1
          done
          # CR 2026-05-19 M2 + L4 — fail-fast 若 120 秒內 Vite 仍未起來:
          # 1) 印 log 末段方便除錯,2) `exit 1` 立刻中斷 job 而非燒滿
          #    `timeout-minutes`(原本會讓後續 visual-diff 撞 connection refused
          #    後 25 分鐘才 timeout)。啟動成功路徑無 log 噪音。
          if [ "$ready" -ne 1 ]; then
            echo "::error::Frontend failed to start within 120s — visual diff cannot run."
            echo "----- last 100 lines of /tmp/nx-serve.log -----"
            tail -n 100 /tmp/nx-serve.log || echo "(log unavailable)"
            exit 1
          fi

      # AC #3 — 用 npm script(不用 `nx affected -t e2e:visual`)。這個
      # script 會對著已提交基準呼叫 `playwright test --project=visual`。
      # AC #2 — 純驗證,失敗時絕對不可自動更新基準。
      - name: Run visual regression (verify-only)
        if: steps.filter.outputs.visual == 'true'
        run: pnpm run test:visual

      # AC #2 — 上傳 Playwright 差異產物(actual.png、diff.png、traces),
      # 給審查者除錯失敗的 PR 檢查用。only-when-visual 條件:不相關 PR 不會
      # 產出 test-results/,連 artifact 步驟都省。
      - name: Upload diff artifacts
        if: always() && steps.filter.outputs.visual == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs-pr-${{ github.run_id }}
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

  main:
    name: Main
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04 # AC #5 — do NOT change to ubuntu-latest, see story 19-5 AC #5
    timeout-minutes: 40
    permissions:
      # `contents: write` + `pull-requests: write` 只有「首次 Linux 基準
      # 引導路徑」需要(peter-evans/create-pull-request 會 commit `-linux`
      # PNG 並開出 bootstrap PR)。若未來移除 bootstrap 分支,請收緊回
      # `{contents: read}`。
      contents: write
      pull-requests: write
    # AC #7 — main concurrency:用獨立 group key,避免 PR 取消波及 main
    # push;同 main 上連續 push 採排隊而不取消(`cancel-in-progress: false`)。
    concurrency:
      group: visual-regression-main
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # 跟 PR job 同樣理由用 Vite dev server —— `/test/gallery` 在 production
      # build 中被 `!import.meta.env.PROD` guard 排除,只有 dev mode 渲染。
      - name: Start frontend (Vite dev server)
        run: |
          npx nx serve web > /tmp/nx-serve.log 2>&1 &
          ready=0
          for _ in {1..120}; do
            if curl -s http://localhost:4200 > /dev/null 2>&1; then
              echo "Frontend ready"
              ready=1
              break
            fi
            sleep 1
          done
          # CR 2026-05-19 M2 + L4 — fail-fast 若 120 秒內 Vite 仍未起來。
          if [ "$ready" -ne 1 ]; then
            echo "::error::Frontend failed to start within 120s — visual diff cannot run."
            echo "----- last 100 lines of /tmp/nx-serve.log -----"
            tail -n 100 /tmp/nx-serve.log || echo "(log unavailable)"
            exit 1
          fi

      # AC #4 — Linux 基準存在性快速計數。對「snapshot 資料夾不存在」做防禦
      # (19-4b 之後正常情況下不會發生,但留著無害):`find` 退出碼非 0
      # 就用 `2>/dev/null` 吞掉、用 `wc -l` 強制取數值。
      #
      # 注意(story bugfix-19-9 2026-05-28):此 step 的 `linux_baselines > 0`
      # 判斷只能區別「first-run」(尚未 bootstrap 任何 Linux 基準) vs「至少有
      # 一個 Linux 基準」兩態。它無法察覺「已有 N 個 Linux 基準,但 fixture
      # 新增後缺 6 個」這類 incremental 場景 —— 後者由下方 `check-freshness`
      # step (story bugfix-19-9 AC #1, [@contract-v3] on 19-5 AC #4) 偵測。
      - name: Check Linux baseline presence
        id: check-linux
        run: |
          linux_count=$(find tests/visual/components.visual.spec.ts-snapshots -name '*-linux.png' 2>/dev/null | wc -l | tr -d ' ')
          linux_count=${linux_count:-0}
          echo "linux_baselines=$linux_count" >> "$GITHUB_OUTPUT"
          echo "Linux baseline count: $linux_count"

      # AC #4 verify-only / freshness probe 分支 —— bootstrap PR 合併後,每次 main
      # push 都走這條。Story bugfix-19-9 ([@contract-v3] on 19-5 AC #4) 把此 step 從
      # 「純 verify-only,失敗即 job 失敗」改為「verify-only 探針,擷取 stdout
      # 給下游 parser 分類,exit code 不直接決定 job 命運」。
      #
      # 為何 `continue-on-error: true`: parser (step `check-freshness`) 解析 log
      # 後可能歸類為:
      #   - bootstrap_needed=true (純 missing-baseline,無 pixel-diff) → 下游觸發
      #     incremental bootstrap branch
      #   - bootstrap_needed=false 但 step 9 失敗 → 真的 pixel diff,job 必須失敗
      #     (`Fail job on real regression` step 在 bootstrap branches 之後做這個收尾)
      # `tee` 同時印到 console (CI log 可讀) 與 /tmp/visual-probe.log (parser 消費)。
      - name: Run visual regression (verify-only freshness probe)
        id: verify-probe
        if: steps.check-linux.outputs.linux_baselines != '0'
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm run test:visual 2>&1 | tee /tmp/visual-probe.log

      # Story bugfix-19-9 AC #1 ([@contract-v3] on 19-5 AC #4) — verify-only log
      # 解析 step。Node ESM parser 把 Playwright stdout 分類進三個 buckets:
      #   - missing-baseline: `A snapshot doesn't exist at <path>, writing actual.`
      #     for paths ending `-linux.png` under `tests/visual/components.visual.spec.ts-snapshots/`
      #   - pixel-diff: `Screenshot comparison failed` header (one per failed stanza)
      #   - other: out-of-scope (e.g. -darwin missing on Linux runner) → human review
      # `bootstrap_needed` 設為 `true` 當且僅當 `missing > 0 && pixel-diff == 0 &&
      # other == 0`(保守原則:未知 pattern → other → bootstrap_needed=false → 人工)。
      # Parser 永遠 exit 0;workflow 用 step outputs 決定後續分支。
      - name: Classify verify-only result via bootstrap-detection
        id: check-freshness
        if: steps.check-linux.outputs.linux_baselines != '0'
        run: node apps/web/src/visual-harness/bootstrap-detection.mjs < /tmp/visual-probe.log

      # AC #4 bootstrap 分支 —— 本工作流落地後,第一次 main push「只跑
      # 一次」。寫入完整 `-linux` PNG 集 + 在 _bmad-output/audit/visual-baseline-19-4.md
      # 追加一行來源紀錄。CR 2026-05-19 H1 修正:格式納入 `ImageVersion`
      # 環境變數(actions/runner-images 發佈版本號,例如 `20260512.1.0`),
      # 提供 GitHub-Hosted Runner 缺乏 SHA digest 情境下的最佳可追溯性。
      - name: Bootstrap Linux baselines
        if: steps.check-linux.outputs.linux_baselines == '0'
        run: |
          set -euo pipefail
          pnpm run test:visual:update
          DATE_UTC=$(date -u +%Y-%m-%d)
          AUDIT_DOC=_bmad-output/audit/visual-baseline-19-4.md
          if [ ! -f "$AUDIT_DOC" ]; then
            echo "::error::Expected audit doc missing: $AUDIT_DOC"
            exit 1
          fi
          # ImageVersion 由 actions/runner-images 注入(例如 `20260512.1.0`);
          # 若該變數不存在(例如自架 runner),fallback 為 `unknown`。
          IMG_VER="${ImageVersion:-unknown}"
          {
            echo ""
            echo "Linux baselines bootstrapped ${DATE_UTC} via runner ubuntu-24.04 (ImageVersion: ${IMG_VER})"
          } >> "$AUDIT_DOC"

      # AC #4 — 透過 peter-evans/create-pull-request@v6 開出一次性 bootstrap
      # PR。該 action 自動把「建分支 + commit + 開 PR」一次完成,且重跑時
      # 具冪等性(同名 head 分支 → 更新既有 PR,而非重複開新的)。固定
      # `@v6` 主版本(依該 action 建議;`@v7` 至 2026-05 仍在 beta)。
      - name: Open Linux-baseline bootstrap PR
        if: steps.check-linux.outputs.linux_baselines == '0'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/bootstrap-linux-baselines-${{ github.run_id }}
          base: ${{ github.ref_name }}
          commit-message: 'chore(visual): bootstrap Linux baselines'
          title: 'chore(visual): bootstrap Linux baselines'
          labels: requires-manual-review
          delete-branch: true
          # CR 2026-05-19 M1 — 顯式收斂 commit 範圍,避免日後新增「會寫
          # worktree 的 step」時意外把無關檔案滑進 bootstrap PR。
          add-paths: |
            tests/visual/components.visual.spec.ts-snapshots/**
            _bmad-output/audit/visual-baseline-19-4.md
          body: |
            本 PR 由 `.github/workflows/visual-regression.yml` (story 19-5)
            在首次執行時自動產生。它把 CI runner 產出的 `-linux` PNG 基準
            commit 入庫,讓視覺基準從「`-darwin` 單平台」(dev 機器,story
            19-4 + 19-4b)轉為「`-darwin` + `-linux`」(dev + CI)雙平台。

            **為什麼會出現這個 PR**
            - Story 19-4 + 19-4b 已 commit 262 張 `-darwin` PNG(Apple Core
              Text 字體渲染,dev 機器產出)。
            - Linux 字體渲染(fontconfig + freetype + DejaVu / Noto /
              Liberation glyphs)在像素層級就不同。Sally 已於 19-4b 批准
              `-darwin` 的「內容」;這裡只預期會看到「渲染」漂移(字體
              hinting、emoji glyph、sub-pixel 定位)。
            - 依 19-4b Task 5 Party Mode 2026-05-14 的裁決:由 CI 工作流
              在首次執行時自動補齊 Linux 基準(Option B)。決策紀錄見
              `tests/visual/README.md` §Platform-suffix 與
              `_bmad-output/audit/visual-baseline-19-4.md`。

            **為什麼貼上 `requires-manual-review`**
            - Sally / UX 把關。請肉眼掃過 `-linux` 變體 vs 已提交的
              `-darwin` 集合。預期只有「渲染漂移」,不該有「內容漂移」。
            - Murat 在 19-4b Task 5 設下的條件:這個 PR 就是把 `-darwin`
              從「primary」位置退場前,Sally 必須再參與一次的閘門。

            **合併後**
            - 工作流的 bootstrap 條件從此永遠為 false(一旦
              `*-linux.png` 存在,該檢查就跳過)。之後每次 main push 都會
              對著 `-darwin` (Mac dev) 與 `-linux` (CI) 兩套基準跑
              verify-only —— Playwright 的 platform-suffix 慣例自然支援。

            **參考**
            - Story:`_bmad-output/implementation-artifacts/19-5-github-actions-visual-regression-pr.md` AC #4
            - 19-4b Task 5:`_bmad-output/implementation-artifacts/19-4b-visual-baseline-bulk-fill.md`
            - 決策樹:`tests/visual/README.md` §Platform-suffix L82–L96
            - 稽核軌跡:`_bmad-output/audit/visual-baseline-19-4.md`
              (這次執行追加的 `Linux baselines bootstrapped …` 行,就在
              本 PR 的 diff 裡)。

      # Story bugfix-19-9 ([@contract-v3] on 19-5 AC #4) — incremental bootstrap
      # branch. Fires when verify-only probe (step `verify-probe`) classifies
      # all failures as `missing-baseline` only (no pixel-diff / no other). This
      # handles the case 19-5's first-run path can't: an existing -linux baseline
      # set with one or more fixtures newly added (e.g. story 19-9's
      # library-recently-added/{recent,stale} 6-fixture split).
      #
      # Uses `pnpm run test:visual:update-missing` (Playwright 1.43+ GA
      # `--update-snapshots=missing`) — generates baselines ONLY for missing
      # snapshots; never overwrites existing baselines; cannot accidentally
      # re-bless a real regression (which would have been classified as pixel-
      # diff by the parser and short-circuited bootstrap_needed to false).
      #
      # Audit-doc line format: distinct from first-run ("Linux baselines
      # incrementally bootstrapped ...") so future mass-rebless investigations
      # can grep both forms separately. `missing_count` + `missing_paths` come
      # from the parser's GITHUB_OUTPUT (heredoc-encoded multiline). The shell
      # flattens paths via `tr '\n' ' '` for a single audit line; the full
      # path list lives in the PR body below.
      - name: Bootstrap Linux baselines (incremental)
        if: steps.check-linux.outputs.linux_baselines != '0' && steps.check-freshness.outputs.bootstrap_needed == 'true'
        run: |
          set -euo pipefail
          pnpm run test:visual:update-missing
          DATE_UTC=$(date -u +%Y-%m-%d)
          AUDIT_DOC=_bmad-output/audit/visual-baseline-19-4.md
          if [ ! -f "$AUDIT_DOC" ]; then
            echo "::error::Expected audit doc missing: $AUDIT_DOC"
            exit 1
          fi
          IMG_VER="${ImageVersion:-unknown}"
          MISSING_COUNT="${{ steps.check-freshness.outputs.missing_count }}"
          # Flatten heredoc-encoded multiline missing_paths into a space-separated list.
          MISSING_PATHS_INLINE=$(printf '%s' "${{ steps.check-freshness.outputs.missing_paths }}" | tr '\n' ' ' | sed 's/  */ /g; s/ $//')
          {
            echo ""
            echo "Linux baselines incrementally bootstrapped ${DATE_UTC} via runner ubuntu-24.04 (ImageVersion: ${IMG_VER}) — ${MISSING_COUNT} fixtures: ${MISSING_PATHS_INLINE}"
          } >> "$AUDIT_DOC"

      # Story bugfix-19-9 ([@contract-v3] on 19-5 AC #4) — incremental bootstrap PR.
      # Parallel to the first-run PR step above; same Sally gate (label
      # `requires-manual-review`, Murat 19-4b Task 5 ruling preserved), distinct
      # branch name (incremental-${run_id} vs first-run's ${run_id}), distinct
      # body template (lists the missing fixtures + cites the originating
      # commit's message for tracing back to the surfacing story).
      - name: Open Linux-baseline bootstrap PR (incremental)
        if: steps.check-linux.outputs.linux_baselines != '0' && steps.check-freshness.outputs.bootstrap_needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/bootstrap-linux-baselines-incremental-${{ github.run_id }}
          base: ${{ github.ref_name }}
          commit-message: 'chore(visual): bootstrap ${{ steps.check-freshness.outputs.missing_count }} missing -linux baselines (incremental)'
          title: 'chore(visual): bootstrap ${{ steps.check-freshness.outputs.missing_count }} missing -linux baselines (incremental)'
          labels: requires-manual-review
          delete-branch: true
          add-paths: |
            tests/visual/components.visual.spec.ts-snapshots/**
            _bmad-output/audit/visual-baseline-19-4.md
          body: |
            本 PR 由 `.github/workflows/visual-regression.yml` (story bugfix-19-9)
            自動產生 —— **incremental bootstrap path**(非 first-run)。

            **緣由**: verify-only probe 偵測到 ${{ steps.check-freshness.outputs.missing_count }} 個 `-linux` baseline 缺失,但 `-linux` 基準目錄並非空 (linux_baselines = ${{ steps.check-linux.outputs.linux_baselines }})。屬於 incremental fixture addition 情境(典型成因: 上游 PR 引入新 fixture/state 並 commit `-darwin` 而未提供 `-linux`)。bootstrap-detection 把所有失敗歸類為純 missing-baseline(無 pixel-diff / 無 other),才自動觸發本 PR;若 probe 偵測到任何真實 pixel-diff,job 失敗收尾於 `Fail job on real regression` step,不會走到這裡。

            **缺失基線 (${{ steps.check-freshness.outputs.missing_count }} 個)**:
            ```
            ${{ steps.check-freshness.outputs.missing_paths }}
            ```

            **觸發 commit**:
            ```
            ${{ github.event.head_commit.message }}
            ```

            **為什麼貼上 `requires-manual-review`**
            - Sally / UX 把關。請肉眼確認每張新基線符合對應元件 + 狀態的視覺預期 (e.g. `library-recently-added/recent` 應該有綠色「新增」badge / `stale` 不應該有)。
            - Murat 在 19-4b Task 5 設下的條件對 incremental 與 first-run 同樣適用 (story bugfix-19-9 AC #3 保留此 gate)。
            - 任何 doubt 即關閉本 PR,以手動 artifact extraction 流程處理 (參考: PR #11)。

            **合併後**
            - 後續 verify-only 對著新基線通過 → `Visual Regression / PR` 變綠。
            - bootstrap-detection 偵測下個 incremental 場景時會再觸發本 path (這次不是死碼,是 steady-state branch)。

            **參考**
            - Story: `_bmad-output/implementation-artifacts/bugfix-19-9-bootstrap-not-incremental.md`
            - Parser: `apps/web/src/visual-harness/bootstrap-detection.mjs` + spec (AC #4)
            - 先例 (manual recovery for the originating gap): PR #11 (`chore/visual-bootstrap-19-9-recent-stale-linux`)
            - Upstream contract: Story 19-5 AC #4 [@contract-v3] (bumped v2→v3 by this story)

      # Story bugfix-19-9 — final gate: fail the job when verify-only probe found
      # failures AND parser classified them as anything other than pure
      # missing-baseline (i.e. real pixel diffs OR out-of-scope failures). The
      # incremental bootstrap branches above intentionally SUCCEED in this case
      # (they only fire when bootstrap_needed='true'), so without this gate, real
      # regressions could ship green. First-run path (linux_baselines='0') skips
      # verify-probe entirely (probe `if:` is gated) so probe outcome is 'skipped'
      # not 'failure' → this gate also skips (correctly).
      - name: Fail job on real regression
        if: steps.verify-probe.outcome == 'failure' && steps.check-freshness.outputs.bootstrap_needed != 'true'
        run: |
          echo "::error::Visual regression verify-only failed AND parser did not classify as pure missing-baseline."
          echo "::error::Likely cause: real pixel-diff against existing -linux baseline (true visual regression)."
          echo "::error::See bootstrap-detection summary above for the missing/pixel-diff/other counts."
          echo "::error::Inspect the uploaded diff artifacts for the actual.png / diff.png / expected.png trio."
          exit 1

      # AC #2 — 失敗時上傳差異產物(bootstrap 之後,則是 verify-only 路徑
      # 失敗時)。bootstrap 路徑不會產生 test-results/,有
      # `if-no-files-found: ignore` 就不會出錯。
      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs-main-${{ github.run_id }}
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
